name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      # Niet-blokkerend: signaal over kwetsbare dependencies zonder de poort
      # dicht te gooien op advisories zonder beschikbare fix.
      - name: Dependency audit
        continue-on-error: true
        run: npm audit --audit-level=moderate

      # E2E is momenteel niet-blokkerend: de Playwright-install (--with-deps)
      # hing herhaaldelijk tot de job-timeout. Lint/typecheck/build/unit zijn
      # de harde poort; E2E levert alleen signaal tot de install stabiel is.
      - name: Install Playwright (Chromium)
        timeout-minutes: 8
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: E2E (Chromium)
        timeout-minutes: 10
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: npm run e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
